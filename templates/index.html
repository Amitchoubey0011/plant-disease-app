<!DOCTYPE html>
<html>
<head>
    <title>Plant Disease Detection</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f6f8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
            text-align: center;
            width: 350px;
        }

        h1 {
            color: #2e7d32;
        }

        input {
            margin: 10px 0;
        }

        button {
            background: #2e7d32;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: #1b5e20;
        }

        img {
            margin-top: 10px;
            border-radius: 10px;
        }

        .result {
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>🌿 Plant Disease Detection</h1>

    <!-- FORM -->
    <form action="/predict" method="post" enctype="multipart/form-data">
        <input type="file" name="file" onchange="previewImage(event)" required>
        <br>
        <button type="submit">Predict</button>
    </form>

    <!-- IMAGE PREVIEW (before upload) -->
    <img id="preview" width="200" style="display:none;">

    <!-- RESULT IMAGE (after upload) -->
    {% if image_path %}
        <img src="{{ url_for('static', filename=image_path) }}" width="200">
    {% endif %}

    <!-- RESULT TEXT -->
    {% if prediction %}
        <div class="result">
            <h3>Result: {{ prediction }}</h3>
            <h4>Confidence: {{ confidence }}%</h4>
        </div>
    {% endif %}
</div>

<!-- JS for preview -->
<script>
function previewImage(event) {
    var reader = new FileReader();
    reader.onload = function(){
        var output = document.getElementById('preview');
        output.src = reader.result;
        output.style.display = 'block';
    }
    reader.readAsDataURL(event.target.files[0]);
}
</script>

</body>
</html>
